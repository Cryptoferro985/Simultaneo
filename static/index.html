<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <title>Simultaneo</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #080a0f;
      --s1:       #0f1219;
      --s2:       #161922;
      --border:   #1e2333;
      --a:        #3d82f6;   /* blue - lang A */
      --b:        #f59e0b;   /* amber - lang B */
      --green:    #10b981;
      --red:      #ef4444;
      --text:     #f0f2f8;
      --muted:    #4a5168;
      --mono:     'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
    }

    /* ──────────── HEADER ──────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .wordmark {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .wordmark .dot { color: var(--a); }

    .latency {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .led {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
    }

    .led.live { background: var(--green); animation: led-blink 1s step-end infinite; }
    @keyframes led-blink { 50% { opacity: 0; } }

    /* ──────────── MODE TABS ──────────── */
    .modes {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--s1);
    }

    .mode-tab {
      flex: 1;
      padding: 11px 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-align: center;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      user-select: none;
    }

    .mode-tab.active { color: var(--text); border-bottom-color: var(--a); }

    /* ──────────── LANG BAR ──────────── */
    .langbar {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--border);
      background: var(--s2);
      flex-shrink: 0;
    }

    .lang-slot {
      flex: 1;
      padding: 9px 14px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .lang-slot label {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .lang-slot.la label { color: var(--a); }
    .lang-slot.lb label { color: var(--b); }

    .lang-slot select {
      background: none;
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      appearance: none;
      cursor: pointer;
      outline: none;
      width: 100%;
    }

    .swap-btn {
      width: 48px;
      background: none;
      border: none;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .swap-btn:active { color: var(--a); }

    /* ──────────── TRANSCRIPT SCROLL ──────────── */
    .scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }

    /* A segment = what was said */
    .seg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: seg-in 0.25s ease;
    }

    @keyframes seg-in { from { opacity: 0; transform: translateY(8px); } }

    .seg-original {
      font-size: 13px;
      color: var(--muted);
      font-family: var(--mono);
      line-height: 1.5;
    }

    .seg-translated {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.45;
    }

    .seg.from-a .seg-translated { color: var(--a); }
    .seg.from-b .seg-translated { color: var(--b); }

    /* Live interim text */
    .live-box {
      background: var(--s1);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
      min-height: 48px;
      flex-shrink: 0;
      margin: 0 0 2px;
    }

    .live-box .interim { color: var(--muted); font-weight: 400; }
    .live-box .final   { color: var(--text); }
    .live-box .placeholder { color: var(--border); font-size: 13px; font-family: var(--mono); }

    /* ──────────── BOTTOM CONTROLS ──────────── */
    .bottom {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: var(--s1);
      padding: 18px 20px max(18px, env(safe-area-inset-bottom));
    }

    /* ── MODE: DIALOGO ── */
    .ctrl-dialogo {
      display: flex;
      gap: 12px;
    }

    .dial-btn {
      flex: 1;
      height: 64px;
      border: 2px solid;
      background: none;
      border-radius: 4px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      transition: all 0.15s;
      touch-action: none;
      user-select: none;
    }

    .dial-btn .icon { font-size: 22px; }
    .dial-btn.a { border-color: var(--a); color: var(--a); }
    .dial-btn.b { border-color: var(--b); color: var(--b); }
    .dial-btn.a.recording { background: var(--a); color: var(--bg); }
    .dial-btn.b.recording { background: var(--b); color: var(--bg); }

    /* ── MODE: SIMULTANEO / ASCOLTO ── */
    .ctrl-single {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    /* Ring + button */
    .ring-wrap {
      position: relative;
      width: 80px; height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--border);
    }

    .ring-wrap.on .ring:nth-child(1) { border-color: var(--green); animation: rout 1.6s ease-out infinite; }
    .ring-wrap.on .ring:nth-child(2) { border-color: var(--green); animation: rout 1.6s ease-out 0.6s infinite; }
    @keyframes rout { from { transform: scale(0.85); opacity: 1; } to { transform: scale(1.6); opacity: 0; } }

    .big-btn {
      position: relative; z-index: 2;
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 2px solid var(--green);
      background: var(--bg);
      color: var(--green);
      font-size: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      touch-action: manipulation;
    }

    .big-btn.on { background: var(--green); color: var(--bg); }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    /* Queue indicator */
    .queue-bar {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .q-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
    }

    .q-dot.active { background: var(--green); }
    .q-dot.pending { background: var(--a); }

    /* Hidden */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="wordmark">simultan<span class="dot">.</span>eo</div>
  <div class="latency">
    <div class="led" id="led"></div>
    <span id="latLabel">PRONTO</span>
  </div>
</div>

<!-- MODE TABS -->
<div class="modes">
  <div class="mode-tab active" data-mode="dialogo"  onclick="setMode('dialogo')">💬 Dialogo</div>
  <div class="mode-tab"        data-mode="simultaneo" onclick="setMode('simultaneo')">🎧 Simultaneo</div>
  <div class="mode-tab"        data-mode="ascolto"  onclick="setMode('ascolto')">👂 Ascolto</div>
</div>

<!-- LANG BAR -->
<div class="langbar">
  <div class="lang-slot la">
    <label id="labelA">Tu parli</label>
    <select id="langA">
      <option value="it">🇮🇹 Italiano</option>
      <option value="en">🇺🇸 English</option>
      <option value="es">🇪🇸 Español</option>
      <option value="fr">🇫🇷 Français</option>
      <option value="de">🇩🇪 Deutsch</option>
      <option value="pt">🇧🇷 Português</option>
      <option value="zh">🇨🇳 中文</option>
      <option value="ja">🇯🇵 日本語</option>
      <option value="ru">🇷🇺 Русский</option>
      <option value="ar">🇸🇦 العربية</option>
      <option value="th">🇹🇭 ภาษาไทย</option>
    </select>
  </div>
  <button class="swap-btn" onclick="swapLangs()">⇄</button>
  <div class="lang-slot lb">
    <label id="labelB">Traduco in</label>
    <select id="langB">
      <option value="en">🇺🇸 English</option>
      <option value="it">🇮🇹 Italiano</option>
      <option value="es">🇪🇸 Español</option>
      <option value="fr">🇫🇷 Français</option>
      <option value="de">🇩🇪 Deutsch</option>
      <option value="pt">🇧🇷 Português</option>
      <option value="zh">🇨🇳 中文</option>
      <option value="ja">🇯🇵 日本語</option>
      <option value="ru">🇷🇺 Русский</option>
      <option value="ar">🇸🇦 العربية</option>
      <option value="th">🇹🇭 ภาษาไทย</option>
    </select>
  </div>
</div>

<!-- TRANSCRIPT AREA -->
<div class="scroll" id="scroll">
  <div class="live-box" id="liveBox">
    <span class="placeholder">Inizia a parlare…</span>
  </div>
  <!-- history segments appear here -->
</div>

<!-- BOTTOM: DIALOGO -->
<div class="bottom" id="ctrlDialogo">
  <div class="ctrl-dialogo">
    <button class="dial-btn a" id="btnA"
      ontouchstart="dialStart('A',event)" ontouchend="dialEnd('A',event)"
      onmousedown="dialStart('A')" onmouseup="dialEnd('A')">
      <span class="icon">🎙</span>
      <span id="btnALabel">Parla A</span>
    </button>
    <button class="dial-btn b" id="btnB"
      ontouchstart="dialStart('B',event)" ontouchend="dialEnd('B',event)"
      onmousedown="dialStart('B')" onmouseup="dialEnd('B')">
      <span class="icon">🎙</span>
      <span id="btnBLabel">Parla B</span>
    </button>
  </div>
</div>

<!-- BOTTOM: SIMULTANEO / ASCOLTO -->
<div class="bottom hidden" id="ctrlSingle">
  <div class="ctrl-single">
    <div class="ring-wrap" id="ringWrap">
      <div class="ring"></div><div class="ring"></div>
      <button class="big-btn" id="bigBtn" onclick="toggleSingle()">🎙</button>
    </div>
    <div class="status-row">
      <div class="queue-bar">
        <div class="q-dot" id="q0"></div>
        <div class="q-dot" id="q1"></div>
        <div class="q-dot" id="q2"></div>
      </div>
      <span id="singleStatus">Tocca per iniziare</span>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const BASE = ''; // vuoto = stesso server; in dev: 'http://localhost:8000'

// ── STATE ──
let mode = 'dialogo';
let isOn = false;
let rec  = null;
let activeWho = null; // 'A' o 'B' (dialogo)

// Pipeline simultanea
let finalBuffer  = '';       // testo finale accumulato
let pendingQueue = [];       // frasi in attesa di traduzione
let audioQueue   = [];       // chunk audio pronti
let isPlaying    = false;
let silenceTimer = null;
const SILENCE_MS = 900;      // ms di silenzio = fine frase

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

// ─────────────────────────────────────────────
// MODES
// ─────────────────────────────────────────────
function setMode(m) {
  // Stop tutto
  stopAll();
  mode = m;

  document.querySelectorAll('.mode-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.mode === m)
  );

  const isDial   = m === 'dialogo';
  const isAscol  = m === 'ascolto';

  document.getElementById('ctrlDialogo').classList.toggle('hidden', !isDial);
  document.getElementById('ctrlSingle').classList.toggle('hidden', isDial);

  // Label adattivi
  document.getElementById('labelA').textContent = isDial ? 'Persona A' : isAscol ? 'Audio in' : 'Parli';
  document.getElementById('labelB').textContent = 'Traduco in';

  const swap = document.querySelector('.swap-btn');
  swap.style.display = isDial ? 'flex' : 'flex';

  clearScroll();
}

// ─────────────────────────────────────────────
// DIALOGO MODE — due bottoni push-to-talk
// ─────────────────────────────────────────────
function dialStart(who, e) {
  if (e) e.preventDefault();
  if (activeWho) return;
  activeWho = who;

  document.getElementById(who === 'A' ? 'btnA' : 'btnB').classList.add('recording');
  const srcLang = who === 'A'
    ? document.getElementById('langA').value
    : document.getElementById('langB').value;
  const tgtLang = who === 'A'
    ? document.getElementById('langB').value
    : document.getElementById('langA').value;

  startRecognition(srcLang, tgtLang, who);
}

function dialEnd(who, e) {
  if (e) e.preventDefault();
  if (activeWho !== who) return;
  activeWho = null;
  document.getElementById(who === 'A' ? 'btnA' : 'btnB').classList.remove('recording');
  stopRecognition();
}

// ─────────────────────────────────────────────
// SIMULTANEO / ASCOLTO MODE — toggle
// ─────────────────────────────────────────────
function toggleSingle() {
  if (isOn) {
    stopAll();
  } else {
    isOn = true;
    document.getElementById('bigBtn').classList.add('on');
    document.getElementById('ringWrap').classList.add('on');
    document.getElementById('led').classList.add('live');
    setLat('LIVE');

    const src = document.getElementById('langA').value;
    const tgt = document.getElementById('langB').value;
    startRecognition(src, tgt, 'A');
    setSingleStatus('Ascolto…');
  }
}

// ─────────────────────────────────────────────
// SPEECH RECOGNITION CORE
// ─────────────────────────────────────────────
function startRecognition(srcLang, tgtLang, who) {
  if (!SR) { alert('Browser non supportato. Usa Safari iOS 13+ o Chrome.'); return; }

  rec = new SR();
  rec.continuous      = true;
  rec.interimResults  = true;
  rec.lang            = langToLocale(srcLang);
  rec.maxAlternatives = 1;

  finalBuffer = '';
  pendingQueue = [];

  rec.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        finalBuffer += t + ' ';
        // Sentence complete → schedule translation
        scheduleSentence(t.trim(), srcLang, tgtLang, who);
      } else {
        interim += t;
      }
    }
    updateLiveBox(finalBuffer, interim);
    resetSilenceTimer(tgtLang, who, srcLang);
  };

  rec.onerror = (e) => {
    if (e.error === 'not-allowed') {
      alert('Microfono non autorizzato.');
      stopAll();
    }
  };

  rec.onend = () => { if (isOn || activeWho) rec.start(); };
  rec.start();
}

function stopRecognition() {
  if (rec) { rec.onend = null; rec.stop(); rec = null; }
  clearTimeout(silenceTimer);
  updateLiveBox('', '');
}

function stopAll() {
  isOn = false;
  activeWho = null;
  stopRecognition();

  document.getElementById('bigBtn').classList.remove('on');
  document.getElementById('ringWrap').classList.remove('on');
  document.getElementById('led').classList.remove('live');
  document.getElementById('btnA').classList.remove('recording');
  document.getElementById('btnB').classList.remove('recording');
  setLat('PRONTO');
  setSingleStatus('Tocca per iniziare');
}

// ─────────────────────────────────────────────
// SENTENCE PIPELINE
// ─────────────────────────────────────────────
// Sentence ready from STT final result
function scheduleSentence(text, srcLang, tgtLang, who) {
  if (!text) return;
  // Kick off translate+TTS immediately (async, non-blocking)
  translateAndSynth(text, srcLang, tgtLang, who);
}

// Silence fallback — flush whatever is in interim
function resetSilenceTimer(tgtLang, who, srcLang) {
  clearTimeout(silenceTimer);
  silenceTimer = setTimeout(() => {
    // Nothing extra needed; SR finals are already handled
  }, SILENCE_MS);
}

let audioQueueProcessing = false;

async function translateAndSynth(text, srcLang, tgtLang, who) {
  setLat('TRADUCO…');
  const t0 = Date.now();
  try {
    const res  = await fetch(`${BASE}/translate-tts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, src_lang: srcLang, tgt_lang: tgtLang }),
    });
    const data = await res.json();
    const ms   = Date.now() - t0;
    setLat(`${ms}ms`);

    // Push to audio queue
    audioQueue.push({ original: text, translated: data.translated, audio_b64: data.audio_b64, who });
    updateQueueDots();

    if (!audioQueueProcessing) drainQueue();

  } catch {
    setLat('ERR');
  }
}

async function drainQueue() {
  audioQueueProcessing = true;
  while (audioQueue.length > 0) {
    const item = audioQueue.shift();
    updateQueueDots();

    // Add to history BEFORE playing so user sees text immediately
    addSegment(item.original, item.translated, item.who);

    await playB64(item.audio_b64);
  }
  audioQueueProcessing = false;
  updateQueueDots();
}

function playB64(b64) {
  return new Promise((resolve) => {
    const binary = atob(b64);
    const bytes  = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob   = new Blob([bytes], { type: 'audio/mp3' });
    const url    = URL.createObjectURL(blob);
    const audio  = new Audio(url);
    audio.onended = () => { URL.revokeObjectURL(url); resolve(); };
    audio.onerror = resolve;
    audio.play().catch(resolve);
  });
}

// ─────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────
function updateLiveBox(final, interim) {
  const box = document.getElementById('liveBox');
  if (!final && !interim) {
    box.innerHTML = '<span class="placeholder">Inizia a parlare…</span>';
    return;
  }
  box.innerHTML =
    (final   ? `<span class="final">${esc(final)}</span>` : '') +
    (interim  ? `<span class="interim"> ${esc(interim)}</span>` : '');
}

function addSegment(original, translated, who) {
  const scroll = document.getElementById('scroll');
  const live   = document.getElementById('liveBox');

  const seg = document.createElement('div');
  seg.className = `seg from-${who.toLowerCase()}`;
  seg.innerHTML = `
    <div class="seg-original">${esc(original)}</div>
    <div class="seg-translated">${esc(translated)}</div>
  `;

  // Insert before live box
  scroll.insertBefore(seg, live);

  // Trim history to 30 segments
  const segs = scroll.querySelectorAll('.seg');
  if (segs.length > 30) segs[0].remove();

  scroll.scrollTop = scroll.scrollHeight;
}

function clearScroll() {
  const scroll = document.getElementById('scroll');
  scroll.querySelectorAll('.seg').forEach(s => s.remove());
  updateLiveBox('', '');
}

function updateQueueDots() {
  const total = audioQueue.length;
  ['q0','q1','q2'].forEach((id, i) => {
    const d = document.getElementById(id);
    d.className = 'q-dot' + (i < total ? ' pending' : '') + (audioQueueProcessing && i === 0 ? ' active' : '');
  });
}

function setLat(txt) {
  document.getElementById('latLabel').textContent = txt;
}

function setSingleStatus(txt) {
  const el = document.getElementById('singleStatus');
  if (el) el.textContent = txt;
}

function swapLangs() {
  const a = document.getElementById('langA');
  const b = document.getElementById('langB');
  [a.value, b.value] = [b.value, a.value];
}

function langToLocale(lang) {
  const map = {
    it:'it-IT', en:'en-US', es:'es-ES', fr:'fr-FR', de:'de-DE',
    pt:'pt-BR', zh:'zh-CN', ja:'ja-JP', ru:'ru-RU', ar:'ar-SA', th:'th-TH'
  };
  return map[lang] || lang;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
setMode('dialogo');
</script>
</body>
</html>
